name: Build and Deploy Backend

on:
  push:
    branches: [ "master" ]

env:
  REGISTRY: ghcr.io
  # We will use lowercase repo name for image tagging
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service: [problem-service, submission-service, socket-service, evaluator-service]
        include:
          - service: problem-service
            context: ./CodeX-Problem-Service
          - service: submission-service
            context: ./CodeX-Submission-Service
          - service: socket-service
            context: ./CodeX-Socket-Service
          - service: evaluator-service
            context: ./CodeX-Evaluator-Service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/codex-${{ matrix.service }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/CodeX
            git pull origin main
            docker compose pull
            docker compose up -d --remove-orphans
