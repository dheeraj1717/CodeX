version: '3.8'

services:
  problem-service:
    image: ghcr.io/dheeraj1717/codex-problem-service:latest
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - ATLAS_DB_URI=${ATLAS_DB_URI}
      - LOG_DB_URI=${LOG_DB_URI}
      - NODE_ENV=production
    restart: always

  submission-service:
    image: ghcr.io/dheeraj1717/codex-submission-service:latest
    ports:
      - "4002:4002"
    environment:
      - PORT=4002
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - ATLAS_URI=${ATLAS_URI}
      - LOG_DB_URI=${LOG_DB_URI}
      - NODE_ENV=production
    restart: always

  socket-service:
    image: ghcr.io/dheeraj1717/codex-socket-service:latest
    ports:
      - "4005:4005"
    environment:
      - PORT=4005
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    restart: always

  evaluator-service:
    image: ghcr.io/dheeraj1717/codex-evaluator-service:latest
    ports:
      - "4001:4001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - PORT=4001
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - LOG_DB_URI=${LOG_DB_URI}
      - NODE_ENV=production
    restart: always
